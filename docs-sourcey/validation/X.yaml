skill: ftpserverlib-sourcey-validation
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

harness:
  cases:
    - name: validate-sourcey-build
      runner: default
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_closed

runners:
  default:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    artifacts:
      named_emits:
        validation: validation
